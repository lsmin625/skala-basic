<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍길동 변신</title>
</head>
<body>
    <script>
        const target = prompt("무엇으로 변신할까요?");
        console.log(target)

        if(target == "") {
            document.write("<h1>연기처럼 사라졌습니다.</h1>");
        } else {
            document.write(`<h1>${target}(으)로 변신했습니다!</h1>`);
        }
    </script>
</body>
</html>
