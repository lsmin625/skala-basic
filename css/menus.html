<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offcanvas 메뉴 예제</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <!-- 메뉴 버튼 -->
    <div class="container mt-3">
        <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu"
            aria-controls="offcanvasMenu">
            <i class="bi bi-list"></i> 메뉴
        </button>
    </div>

    <!-- Offcanvas 메뉴 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasMenuLabel">메뉴</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <!-- Accordion 메뉴 -->
            <div class="accordion" id="menuAccordion">
                <!-- 상위 메뉴 1 -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#menu1" aria-expanded="true" aria-controls="menu1">
                            상위 메뉴 1
                        </button>
                    </h2>
                    <div id="menu1" class="accordion-collapse collapse show" data-bs-parent="#menuAccordion">
                        <div class="accordion-body">
                            <ul class="list-unstyled">
                                <li><a href="#" class="text-decoration-none">하위 메뉴 1-1</a></li>
                                <li><a href="#" class="text-decoration-none">하위 메뉴 1-2</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- 상위 메뉴 2 -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#menu2" aria-expanded="false" aria-controls="menu2">
                            상위 메뉴 2
                        </button>
                    </h2>
                    <div id="menu2" class="accordion-collapse collapse" data-bs-parent="#menuAccordion">
                        <div class="accordion-body">
                            <ul class="list-unstyled">
                                <li><a href="#" class="text-decoration-none">하위 메뉴 2-1</a></li>
                                <li><a href="#" class="text-decoration-none">하위 메뉴 2-2</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- 상위 메뉴 3 -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#menu3" aria-expanded="false" aria-controls="menu3">
                            상위 메뉴 3
                        </button>
                    </h2>
                    <div id="menu3" class="accordion-collapse collapse" data-bs-parent="#menuAccordion">
                        <div class="accordion-body">
                            <ul class="list-unstyled">
                                <li><a href="#" class="text-decoration-none">하위 메뉴 3-1</a></li>
                                <li><a href="#" class="text-decoration-none">하위 메뉴 3-2</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
