<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Flex Layout</title>
  <style>
    body {
      margin: 40px;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 800px;
    }

    /* 상단 검색 영역 */
    .search-area {
      display: flex;
      gap: 10px;
    }

    .search-area input {
      flex: 1;
      padding: 10px;
      border: 1px solid #999;
      font-size: 14px;
    }

    .search-area button {
      padding: 10px 20px;
      border: 1px solid #999;
      background: #f5f5f5;
      cursor: pointer;
    }

    /* 하단 데이터 영역 */
    .data-area {
      border: 1px dotted #ccc;
      padding: 15px;
      height: 50vh;
      background-color: rgba(240, 240, 240, 0.8);
    }
    .data-area h3 {
      margin: 0 0 10px;
    }

    .divider {
      border-top: 1px solid blueviolet;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search-area">
      <input type="text" placeholder="키워드 입력" />
      <button>검색</button>
    </div>

    <div class="data-area">
      <h3>목록형 데이터 영역</h3>
      <div class="divider"></div>
    </div>
  </div>
</body>
</html>
