<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>div: block vs inline 비교</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif; margin: 24px; }
    h2 { margin: 0 0 12px; }
    .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }

    .panel {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      width: 380px;
      background: #fafafa;
    }

    .note { font-size: 14px; color: #444; margin: 8px 0 12px; line-height: 1.5; }
    .wrap {
      border: 1px dashed #bbb;
      padding: 10px;
      background: #fff;
    }

    /* 공통 박스 모양 */
    .box {
      background: #ffe7b3;
      border: 2px solid #f2a23a;
      padding: 8px 10px;
      margin: 6px 0;
      border-radius: 4px;
      font-weight: bold;
    }

    /* 1) div를 block처럼(기본값) */
    .as-block { display: block; width: 90%; } /* width 적용됨 */

    /* 2) div를 inline처럼 */
    .as-inline { display: inline; width: 260px; } /* inline이라 width가 눈에 띄게 적용되지 않음 */
    /* inline에서는 margin-top/bottom도 기대와 다르게 보일 수 있음 */
  </style>
</head>
<body>
  <h2>&lt;div&gt;를 CSS로 block / inline 비교</h2>

  <div class="row">
    <!-- BLOCK -->
    <section class="panel">
      <h3>1) display: block</h3>
      <p class="note">
        블록은 <b>한 줄을 차지</b>하며, <b>width/height</b>가 잘 적용됩니다.
      </p>

      <div class="wrap">
        <div class="box as-block">DIV A (block)</div>
        <div class="box as-block">DIV B (block)</div>
        <div class="box as-block">DIV C (block)</div>
      </div>
    </section>

    <!-- INLINE -->
    <section class="panel">
      <h3>2) display: inline</h3>
      <p class="note">
        인라인은 <b>내용만큼만 차지</b>하고 같은 줄에 배치됩니다.
        (예: <b>width</b>가 눈에 띄게 적용되지 않음)
      </p>

      <div class="wrap">
        <div class="box as-inline">DIV A</div>
        <div class="box as-inline">DIV B</div>
        <div class="box as-inline">DIV C</div>
      </div>
    </section>
  </div>
</body>
</html>
