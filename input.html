<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여러가지 입력 유형</title>
</head>

<body>
    <h1>여러가지 입력 유형</h1>
    <form>
        <label for="textInput">텍스트 입력:</label>
        <input type="text" id="textInput" name="textInput"><br><br>

        <label for="emailInput">이메일 입력:</label>
        <input type="email" id="emailInput" name="emailInput"><br><br>

        <label for="passwordInput">비밀번호 입력:</label>
        <input type="password" id="passwordInput" name="passwordInput"><br><br>

        <label for="numberInput">숫자 입력:</label>
        <input type="number" id="numberInput" name="numberInput" step="0.1" min="0" max="1"><br><br>

        <label for="dateInput">날짜 입력:</label>
        <input type="date" id="dateInput" name="dateInput"><br><br>

        <label for="checkboxInput">약관 동의:</label>
        <input type="checkbox" id="checkboxInput" name="checkboxInput"> 동의합니다<br><br>

        <label for="radioInput1">남성</label>
        <input type="radio" id="radioInput1" name="gender" value="male">
        <label for="radioInput2">여성</label>
        <input type="radio" id="radioInput2" name="gender" value="female"><br><br>

        <label for="radioInput1">초등학생</label>
        <input type="radio" id="radioInput1" name="gender" value="elementary">
        <label for="radioInput2">중학생</label>
        <input type="radio" id="radioInput2" name="gender" value="middle">
        <label for="radioInput3">고등학생</label>
        <input type="radio" id="radioInput3" name="gender" value="high">
        <br><br>

        <select id="fruitSelect">
            <option value="">-- 과일 선택 --</option>
            <option value="사과">사과</option>
            <option value="바나나">바나나</option>
            <option value="포도">포도</option>
            <option value="오렌지">오렌지</option>
        </select>

        <button type="submit" value="제출">제출</button>
        <button type="reset" value="초기화">초기화</button>
    </form>
</body>

</html>
