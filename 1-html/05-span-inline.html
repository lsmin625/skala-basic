<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 구획</title>
</head>
<body>
    <p>오늘은 <span style="color: green;">행복한 날</span>입니다.</p>
    <p>내일은 <span style="color: blue; font-weight: bold;">더 행복한 날</span>입니다.</p>
    <p>이것은 <b>굵은</b> 텍스트입니다.</p>
    <p>이것은 <strong>중요한</strong> 텍스트입니다.</p>
    <p>이것은 <i>기울임</i> 텍스트입니다.</p>
    <p>이것은 <em>강조된</em> 텍스트입니다.</p>
    <p>이것은 <mark>강조 표시된</mark> 텍스트입니다.</p>
    <p>이것은 <small>작은</small> 텍스트입니다.</p>
    <p>H<sub>2</sub>O는 물입니다.</p>
    <p>E=mc<sup>2</sup>입니다.</p>
</body>
</html>
