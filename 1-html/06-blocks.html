<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블록 요소</title>
</head>
<body>
    <div>
        <h1>블록 요소 예시</h1>
        
        <p>이것은 단락 요소입니다. 블록 요소는 전체 너비를 차지하고 새로운 줄에서 시작합니다.</p>
        
        <p>또 다른 단락입니다.</p>
        
        <table border="1">
            <tr>
                <th>요소명</th>
                <th>설명</th>
            </tr>
            <tr>
                <td>div</td>
                <td>콘텐츠를 그룹화하는 컨테이너</td>
            </tr>
            <tr>
                <td>p</td>
                <td>단락 요소</td>
            </tr>
        </table>
        
        <h2>순서 목록</h2>
        <ol>
            <li>첫 번째 항목</li>
            <li>두 번째 항목</li>
            <li>세 번째 항목</li>
        </ol>
        
        <h2>비순서 목록</h2>
        <ul>
            <li>항목 1</li>
            <li>항목 2</li>
            <li>항목 3</li>
        </ul>
    </div>
</body>
</html>
