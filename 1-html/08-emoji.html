<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Example</title>
</head>
<body>
    <h1>자주 사용되는 이모지</h1>
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>이모지</th>
                <th>의미</th>
                <th>유니코드</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>😀</td>
                <td>웃는 얼굴</td>
                <td>U+1F600</td>
            </tr>
            <tr>
                <td>❤️</td>
                <td>빨간 하트</td>
                <td>U+2764</td>
            </tr>
            <tr>
                <td>👍</td>
                <td>좋아요</td>
                <td>U+1F44D</td>
            </tr>
            <tr>
                <td>🎉</td>
                <td>축하</td>
                <td>U+1F389</td>
            </tr>
            <tr>
                <td>🚀</td>
                <td>로켓</td>
                <td>U+1F680</td>
            </tr>
            <tr>
                <td>⭐</td>
                <td>별</td>
                <td>U+2B50</td>
            </tr>
            <tr>
                <td>🔥</td>
                <td>불</td>
                <td>U+1F525</td>
            </tr>
            <tr>
                <td>😂</td>
                <td>웃으며 우는 얼굴</td>
                <td>U+1F602</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
